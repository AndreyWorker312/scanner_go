<!DOCTYPE html><html lang="ru"><head><title>Nmap История — WebScanAPI</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/scanner.css"></head>
<body style="display:block;padding:24px">
<div class="history-page-container">
  <a href="index.html?page=nmap" class="back-link">← Назад к Nmap</a>
  <div class="history-page-header"><h1>⚡ Nmap История</h1><p>Просмотр истории Nmap сканирования</p></div>
  <div class="card"><div class="button-group"><button onclick="load()" class="btn-primary">🔄 Обновить</button><button onclick="clearAll()" class="btn-danger">🗑 Очистить</button></div></div>
  <div class="history-card-panel"><div class="history-card-header">📋 Записи Nmap</div><div class="history-card-content" id="content"><div class="empty-state"><div class="empty-state-icon">⏳</div><p>Загрузка...</p></div></div></div>
</div>
<script src="js/common.js"></script>
<script>
function load(){var c=$('#content');c.innerHTML='<div class="empty-state"><p>Загрузка...</p></div>';fetch('/api/history/nmap').then(function(r){return r.json()}).then(function(d){if(d.success)render(d.data||{});else c.innerHTML='<div class="error-message">'+escapeHtml(d.error)+'</div>'}).catch(function(e){c.innerHTML='<div class="error-message">'+escapeHtml(e.message)+'</div>'})}
function render(data){var c=$('#content');if(!data||typeof data!=='object'){c.innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><p>Нет записей</p></div>';return}var h='';if(Array.isArray(data)&&data.length){h+=section('Nmap','',data)}else{if(data.tcp_udp&&data.tcp_udp.length)h+=section('TCP/UDP','',data.tcp_udp);if(data.os_detection&&data.os_detection.length)h+=section('OS Detection','os',data.os_detection);if(data.host_discovery&&data.host_discovery.length)h+=section('Host Discovery','discovery',data.host_discovery)}c.innerHTML=h||'<div class="empty-state"><div class="empty-state-icon">📭</div><p>Нет записей</p></div>'}
function section(title,cls,recs){var h='<h3 class="section-title '+cls+'">'+escapeHtml(title)+'</h3>';recs.forEach(function(r){var date=r.created_at?new Date(r.created_at).toLocaleString('ru-RU'):'N/A';var target=r.ip||r.host||'N/A';h+='<div class="history-item"><div class="history-item-header"><div class="task-id">'+escapeHtml(r.task_id||'')+'</div><div class="task-date">'+date+'</div></div><div class="history-item-body"><div class="info-item"><span class="info-label">Цель</span><span class="info-value">'+escapeHtml(target)+'</span></div><div class="info-item"><span class="info-label">Тип</span><span class="info-value">'+escapeHtml(r.scanner_type||r.type||'')+'</span></div><div class="info-item"><span class="info-label">Статус</span><span class="info-value '+(r.status==='completed'?'status-completed':'status-error')+'">'+escapeHtml(r.status||'')+'</span></div>'+(r.ports?'<div class="info-item"><span class="info-label">Порты</span><span class="info-value">'+escapeHtml(r.ports)+'</span></div>':'')+(r.name?'<div class="info-item"><span class="info-label">ОС</span><span class="info-value">'+escapeHtml(r.name)+'</span></div>':'')+'</div>'+(r.error?'<div class="error-message">'+escapeHtml(r.error)+'</div>':'')+'</div>'});return h}
function clearAll(){if(!confirm('Очистить?'))return;fetch('/api/history/nmap/delete',{method:'DELETE'}).then(function(r){return r.json()}).then(function(d){if(d.success)load();else alert(d.error)}).catch(function(){alert('Ошибка')})}
window.addEventListener('DOMContentLoaded',load);
</script></body></html>
