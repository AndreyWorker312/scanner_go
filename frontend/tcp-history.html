<!DOCTYPE html><html lang="ru"><head><title>TCP История — WebScanAPI</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/scanner.css"></head>
<body style="display:block;padding:24px">
<div class="history-page-container">
  <a href="index.html?page=tcp" class="back-link">← Назад к TCP Grabber</a>
  <div class="history-page-header"><h1>⇌ TCP История</h1><p>Просмотр истории TCP сканирования</p></div>
  <div class="card"><div class="button-group"><button onclick="load()" class="btn-primary">🔄 Обновить</button><button onclick="clearAll()" class="btn-danger">🗑 Очистить</button></div></div>
  <div class="history-card-panel"><div class="history-card-header">📋 Записи TCP</div><div class="history-card-content" id="content"><div class="empty-state"><div class="empty-state-icon">⏳</div><p>Загрузка...</p></div></div></div>
</div>
<script src="js/common.js"></script>
<script>
function load(){var c=$('#content');c.innerHTML='<div class="empty-state"><p>Загрузка...</p></div>';fetch('/api/history/tcp').then(function(r){return r.json()}).then(function(d){if(d.success)render(d.data||[]);else c.innerHTML='<div class="error-message">'+escapeHtml(d.error)+'</div>'}).catch(function(e){c.innerHTML='<div class="error-message">'+escapeHtml(e.message)+'</div>'})}
function render(recs){var c=$('#content');if(!recs||!recs.length){c.innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><p>Нет записей</p></div>';return}var h='';recs.forEach(function(r){var date=r.created_at?new Date(r.created_at).toLocaleString('ru-RU'):'N/A';h+='<div class="history-item"><div class="history-item-header"><div class="task-id">'+escapeHtml(r.task_id||'')+'</div><div class="task-date">'+date+'</div></div><div class="history-item-body"><div class="info-item"><span class="info-label">Цель</span><span class="info-value">'+escapeHtml(r.host||'')+':'+escapeHtml(r.port||'')+'</span></div><div class="info-item"><span class="info-label">Статус</span><span class="info-value '+(r.status==='completed'?'status-completed':'status-error')+'">'+escapeHtml(r.status||'')+'</span></div></div>'+(r.hex_object_key?'<div style="margin-top:8px"><span class="info-label">Hex Key</span><div class="info-value mono" style="font-size:11px;word-break:break-all">'+escapeHtml(r.hex_object_key)+'</div></div>':'')+(r.decoded_text?'<div style="margin-top:8px"><span class="info-label">Decoded Text</span><div class="decoded-text">'+escapeHtml(r.decoded_text)+'</div></div>':'')+(r.error?'<div class="error-message">'+escapeHtml(r.error)+'</div>':'')+'</div>'});c.innerHTML=h}
function clearAll(){if(!confirm('Очистить?'))return;fetch('/api/history/tcp/delete',{method:'DELETE'}).then(function(r){return r.json()}).then(function(d){if(d.success)load();else alert(d.error)}).catch(function(){alert('Ошибка')})}
window.addEventListener('DOMContentLoaded',load);
</script></body></html>
