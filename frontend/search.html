<!DOCTYPE html><html lang="ru"><head><title>Поиск — WebScanAPI</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/scanner.css"></head>
<body style="display:block;padding:24px">
<div class="search-container">
  <a href="index.html" class="back-link">← Главная</a>
  <div class="history-page-header"><h1>⌕ Поиск в базе данных</h1><p>Поиск ранее выполненных сканирований</p></div>
  <div class="card">
    <div class="form-group"><label for="scanType">Тип сканирования</label>
      <select id="scanType" onchange="toggleFields()">
        <option value="icmp">ICMP Ping</option><option value="arp">ARP Scan</option><option value="tcp">TCP Scan</option>
        <option value="nmap_tcp_udp">Nmap TCP/UDP</option><option value="nmap_os">Nmap OS Detection</option><option value="nmap_host">Nmap Host Discovery</option>
      </select>
    </div>
    <div id="fIcmp"><div class="form-group"><label>Хосты (через запятую)</label><input type="text" id="icmpTargets" placeholder="8.8.8.8, google.com"></div><div class="form-group"><label>Пакетов</label><input type="number" id="icmpPingCount" value="4" min="1"></div></div>
    <div id="fNmap" class="hidden"><div class="form-group"><label>IP</label><input type="text" id="nmapIp" placeholder="192.168.1.1"></div><div class="form-group"><label>Порты</label><input type="text" id="nmapPorts2" placeholder="80,443"></div></div>
    <div id="fArp" class="hidden"><div class="form-group"><label>Интерфейс</label><input type="text" id="arpIface" placeholder="wlo1"></div><div class="form-group"><label>Диапазон</label><input type="text" id="arpRange2" placeholder="192.168.1.0/24"></div></div>
    <div id="fTcp" class="hidden"><div class="form-group"><label>Хост</label><input type="text" id="tcpHost2" placeholder="telehack.com"></div><div class="form-group"><label>Порт</label><input type="text" id="tcpPort2" placeholder="23"></div></div>
    <div class="button-group" style="margin-top:12px"><button onclick="doSearch()" id="btnSearch" class="btn-primary">Искать</button><button onclick="loadHist()" class="btn-secondary">Загрузить историю</button></div>
  </div>
  <div id="searchResult" class="hidden"></div>
  <div class="card" style="margin-top:16px"><h2>История</h2><div id="historyList"></div></div>
  <div id="detailCard" class="card hidden" style="margin-top:16px"><h2>Детали</h2><div id="detailContent"></div></div>
</div>
<script src="js/common.js"></script>
<script>
var scanType=$('#scanType');
function toggleFields(){var t=scanType.value;$('#fIcmp').classList.toggle('hidden',t!=='icmp');$('#fNmap').classList.toggle('hidden',t.indexOf('nmap')===-1);$('#fArp').classList.toggle('hidden',t!=='arp');$('#fTcp').classList.toggle('hidden',t!=='tcp')}
function showRes(html,cls){var el=$('#searchResult');el.className='result-box '+(cls||'');el.innerHTML=html;el.classList.remove('hidden')}
function recordId(r){return r._id||r.id||r.task_id||''}
function apiFetch(url,opts){opts=opts||{};return fetch(url,opts).then(function(r){return r.text().then(function(txt){try{return JSON.parse(txt)}catch(e){return{success:false,error:txt}}})})}
function getByIdUrl(type){return{icmp:'/api/history/icmp/by-id',nmap_tcp_udp:'/api/history/nmap/tcp_udp/by-id',nmap_os_detection:'/api/history/nmap/os_detection/by-id',nmap_host_discovery:'/api/history/nmap/host_discovery/by-id',arp:'/api/history/arp/by-id',tcp:'/api/history/tcp/by-id'}[type]||null}
function bindViews(){$$('.view-link').forEach(function(a){a.onclick=function(e){e.preventDefault();var id=this.dataset.id,type=this.dataset.type,url=getByIdUrl(type);if(!url)return;$('#detailContent').innerHTML='Загрузка...';$('#detailCard').classList.remove('hidden');apiFetch(url+'?id='+encodeURIComponent(id)).then(function(d){$('#detailContent').innerHTML=d&&d.success?'<pre style="background:var(--bg-primary);padding:12px;border-radius:4px;overflow:auto;font-size:12px;color:var(--accent-green)">'+escapeHtml(JSON.stringify(d.data,null,2))+'</pre>':'<div class="error-message">Не найдено</div>'})}})}

function doSearch(){var type=scanType.value;var body,url;
if(type==='icmp'){var t=$('#icmpTargets').value.trim();if(!t){showRes('Укажите хосты','error');return}url='/api/search/icmp';body={targets:t.split(',').map(function(s){return s.trim()}).filter(Boolean),ping_count:parseInt($('#icmpPingCount').value)||4,limit:20}}
else if(type.indexOf('nmap')===0){var ip=$('#nmapIp').value.trim();if(!ip){showRes('Укажите IP','error');return}var sm=type==='nmap_tcp_udp'?'tcp_udp_scan':type==='nmap_os'?'os_detection':'host_discovery';url='/api/search/nmap';body={scan_method:sm,ip:ip,ports:$('#nmapPorts2').value.trim(),limit:20}}
else if(type==='arp'){var iface=$('#arpIface').value.trim(),range=$('#arpRange2').value.trim();if(!iface||!range){showRes('Укажите интерфейс и диапазон','error');return}url='/api/search/arp';body={interface_name:iface,ip_range:range,limit:20}}
else if(type==='tcp'){var h=$('#tcpHost2').value.trim(),p=$('#tcpPort2').value.trim();if(!h||!p){showRes('Укажите хост и порт','error');return}url='/api/search/tcp';body={host:h,port:p,limit:20}}
apiFetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(d){if(!d.success){showRes('Ошибка: '+escapeHtml(d.error||''),'error');return}if(d.found&&d.data){var list=Array.isArray(d.data)?d.data:[d.data];var idType=type==='nmap_tcp_udp'?'nmap_tcp_udp':type==='nmap_os'?'nmap_os_detection':type==='nmap_host'?'nmap_host_discovery':type;var html='Найдено '+list.length+' записей:<br><br>';list.forEach(function(r){var date=r.created_at?new Date(r.created_at).toLocaleString('ru-RU'):'';var id=recordId(r);html+='<div class="search-history-item"><span>'+escapeHtml(r.task_id||'')+' <span class="date-badge">'+date+'</span></span>'+(id?'<a class="view-link" data-id="'+escapeHtml(id)+'" data-type="'+idType+'">Просмотр</a>':'')+'</div>'});showRes(html,'from-cache');bindViews()}else{var pg=type==='icmp'?'icmp':type==='arp'?'arp':type==='tcp'?'tcp':'nmap';showRes('В БД не найдено.<br><br><a href="index.html?page='+pg+'" class="btn-goto-scanner">Выполнить скан →</a>','scan-started')}}).catch(function(e){showRes('Ошибка: '+escapeHtml(e.message),'error')})}

function loadHist(){var type=scanType.value;var url;if(type==='icmp')url='/api/history/icmp?limit=20';else if(type==='arp')url='/api/history/arp?limit=20';else if(type==='tcp')url='/api/history/tcp?limit=20';else{var k=type==='nmap_tcp_udp'?'tcp_udp':type==='nmap_os'?'os_detection':'host_discovery';url='/api/history/nmap?limit=20&type='+k}var hl=$('#historyList');hl.innerHTML='Загрузка...';apiFetch(url).then(function(d){if(!d||!d.success){hl.innerHTML='Ошибка: '+escapeHtml(d.error||'');return}var list=[];if(type==='icmp'||type==='arp'||type==='tcp')list=d.data||[];else{var k2=type==='nmap_tcp_udp'?'tcp_udp':type==='nmap_os'?'os_detection':'host_discovery';list=(d.data&&d.data[k2])||[]}var idType=type==='nmap_tcp_udp'?'nmap_tcp_udp':type==='nmap_os'?'nmap_os_detection':type==='nmap_host'?'nmap_host_discovery':type;if(!list.length){hl.innerHTML='Нет записей';return}var h='';list.forEach(function(r){var date=r.created_at?new Date(r.created_at).toLocaleString('ru-RU'):'';var id=recordId(r);h+='<div class="search-history-item"><span>'+escapeHtml(r.task_id||id||'')+' <span class="date-badge">'+date+'</span></span>'+(id?'<a class="view-link" data-id="'+escapeHtml(id)+'" data-type="'+idType+'">Просмотр</a>':'')+'</div>'});hl.innerHTML=h;bindViews()}).catch(function(e){hl.innerHTML='Ошибка: '+escapeHtml(e.message)})}
toggleFields();
</script></body></html>
