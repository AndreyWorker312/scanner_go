<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Tester</title>
    <style>
        #output { 
            height: 300px; 
            overflow-y: scroll; 
            border: 1px solid #ccc; 
            padding: 10px; 
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>WebSocket Test</h1>
    <button id="connectBtn">Connect</button>
    <button id="scanBtn" disabled>Test Scan</button>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        let socket;
        
        function log(message) {
            output.innerHTML += `<div>${new Date().toISOString()}: ${message}</div>`;
            output.scrollTop = output.scrollHeight;
        }

        document.getElementById('connectBtn').onclick = function() {
            socket = new WebSocket('ws://localhost:8080/api/v1/ws');
            
            socket.onopen = function(e) {
                log("WebSocket connected");
                document.getElementById('scanBtn').disabled = false;
            };
            
            socket.onmessage = function(event) {
                log("Received: " + event.data);
            };
            
            socket.onclose = function(event) {
                log("WebSocket disconnected");
                document.getElementById('scanBtn').disabled = true;
            };
            
            socket.onerror = function(error) {
                log("WebSocket error: " + error.message);
            };
        };

        document.getElementById('scanBtn').onclick = function() {
            fetch('http://localhost:8080/api/v1/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip: 'google.com', ports: '80,443' })
            })
            .then(response => response.json())
            .then(data => log("Scan started: " + JSON.stringify(data)))
            .catch(error => log("Error: " + error));
        };
    </script>
</body>
</html>
