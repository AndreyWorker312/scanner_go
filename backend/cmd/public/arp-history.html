<!DOCTYPE html><html lang="ru"><head><title>ARP История — WebScanAPI</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/scanner.css"></head>
<body style="display:block;padding:24px">
<div class="history-page-container">
  <a href="index.html?page=arp" class="back-link">← Назад к ARP Scanner</a>
  <div class="history-page-header"><h1>⎔ ARP История</h1><p>Просмотр истории ARP сканирования</p></div>
  <div class="card"><div class="button-group"><button onclick="load()" class="btn-primary">🔄 Обновить</button><button onclick="clearAll()" class="btn-danger">🗑 Очистить</button></div></div>
  <div class="history-card-panel"><div class="history-card-header">📋 Записи ARP</div><div class="history-card-content" id="content"><div class="empty-state"><div class="empty-state-icon">⏳</div><p>Загрузка...</p></div></div></div>
</div>
<script src="js/common.js"></script>
<script>
function load(){var c=$('#content');c.innerHTML='<div class="empty-state"><div class="empty-state-icon">⏳</div><p>Загрузка...</p></div>';fetch('/api/history/arp').then(function(r){return r.json()}).then(function(d){if(d.success)render(d.data||[]);else c.innerHTML='<div class="error-message">'+escapeHtml(d.error||'Ошибка')+'</div>'}).catch(function(e){c.innerHTML='<div class="error-message">'+escapeHtml(e.message)+'</div>'})}
function render(recs){var c=$('#content');if(!recs||!recs.length){c.innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><p>Нет записей</p></div>';return}var h='';recs.forEach(function(r){var date=r.created_at?new Date(r.created_at).toLocaleString('ru-RU'):'N/A';var on=Array.isArray(r.online_devices)?r.online_devices:[],off=Array.isArray(r.offline_devices)?r.offline_devices:[];var dh='';if(on.length){dh+='<div class="devices-section"><strong style="color:var(--accent-green)">● Онлайн:</strong><div class="devices-list"><ul>';on.forEach(function(d){dh+='<li class="device-online-item"><strong>'+escapeHtml(d.ip)+'</strong> MAC: '+escapeHtml(d.mac||'—')+'</li>'});dh+='</ul></div></div>'}if(off.length){dh+='<div class="devices-section"><strong style="color:var(--accent-red)">● Оффлайн:</strong><div class="devices-list"><ul>';off.forEach(function(d){dh+='<li class="device-offline-item"><strong>'+escapeHtml(d.ip)+'</strong></li>'});dh+='</ul></div></div>'}h+='<div class="history-item"><div class="history-item-header"><div class="task-id">'+escapeHtml(r.task_id||'')+'</div><div class="task-date">'+date+'</div></div><div class="history-item-body"><div class="info-item"><span class="info-label">Диапазон</span><span class="info-value">'+escapeHtml(r.ip_range||'')+'</span></div><div class="info-item"><span class="info-label">Интерфейс</span><span class="info-value">'+escapeHtml(r.interface_name||'')+'</span></div><div class="info-item"><span class="info-label">Статус</span><span class="info-value '+(r.status==='completed'?'status-completed':'status-error')+'">'+escapeHtml(r.status||'')+'</span></div><div class="info-item"><span class="info-label">Online</span><span class="info-value status-completed">'+(r.online_count||0)+'</span></div><div class="info-item"><span class="info-label">Offline</span><span class="info-value status-error">'+(r.offline_count||0)+'</span></div></div>'+dh+'</div>'});c.innerHTML=h}
function clearAll(){if(!confirm('Очистить?'))return;fetch('/api/history/arp/delete',{method:'DELETE'}).then(function(r){return r.json()}).then(function(d){if(d.success)load();else alert(d.error)}).catch(function(){alert('Ошибка')})}
window.addEventListener('DOMContentLoaded',load);
</script></body></html>
