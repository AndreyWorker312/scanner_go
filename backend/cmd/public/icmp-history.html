<!DOCTYPE html><html lang="ru"><head><title>ICMP История — WebScanAPI</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/scanner.css"></head>
<body style="display:block;padding:24px">
<div class="history-page-container">
  <a href="index.html?page=icmp" class="back-link">← Назад к ICMP Ping</a>
  <div class="history-page-header"><h1>⇆ ICMP История</h1><p>Просмотр истории ICMP пингов</p></div>
  <div class="card"><div class="button-group"><button onclick="load()" class="btn-primary">🔄 Обновить</button><button onclick="clearAll()" class="btn-danger">🗑 Очистить</button></div></div>
  <div class="history-card-panel"><div class="history-card-header">📋 Записи ICMP</div><div class="history-card-content" id="content"><div class="empty-state"><div class="empty-state-icon">⏳</div><p>Загрузка...</p></div></div></div>
</div>
<script src="js/common.js"></script>
<script>
function load(){var c=$('#content');c.innerHTML='<div class="empty-state"><p>Загрузка...</p></div>';fetch('/api/history/icmp').then(function(r){return r.json()}).then(function(d){if(d.success)render(d.data||[]);else c.innerHTML='<div class="error-message">'+escapeHtml(d.error)+'</div>'}).catch(function(e){c.innerHTML='<div class="error-message">'+escapeHtml(e.message)+'</div>'})}
function render(recs){var c=$('#content');if(!recs||!recs.length){c.innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><p>Нет записей</p></div>';return}var h='';recs.forEach(function(r){var date=r.created_at?new Date(r.created_at).toLocaleString('ru-RU'):'N/A';var targets=Array.isArray(r.targets)?r.targets.join(', '):(r.targets||'');var results=Array.isArray(r.results)?r.results:[];var rh='';if(results.length){rh='<div class="results-section"><strong>Результаты:</strong><div class="results-list"><ul>';results.forEach(function(res){var ok=res.packets_received>0;var loss=(res.packet_loss_percent||0).toFixed(1);rh+='<li class="'+(ok?'result-success':'result-failed')+'"><strong>'+escapeHtml(res.target||'')+'</strong> ('+escapeHtml(res.address||'')+') — '+(res.packets_received||0)+'/'+(res.packets_sent||0)+', потери: '+loss+'%'+(res.error?' <span style="color:var(--accent-red)">'+escapeHtml(res.error)+'</span>':'')+'</li>'});rh+='</ul></div></div>'}h+='<div class="history-item"><div class="history-item-header"><div class="task-id">'+escapeHtml(r.task_id||'')+'</div><div class="task-date">'+date+'</div></div><div class="history-item-body"><div class="info-item"><span class="info-label">Цели</span><span class="info-value">'+escapeHtml(targets)+'</span></div><div class="info-item"><span class="info-label">Пакетов</span><span class="info-value">'+(r.ping_count||0)+'</span></div><div class="info-item"><span class="info-label">Статус</span><span class="info-value '+(r.status==='completed'?'status-completed':'status-error')+'">'+escapeHtml(r.status||'')+'</span></div></div>'+rh+'</div>'});c.innerHTML=h}
function clearAll(){if(!confirm('Очистить?'))return;fetch('/api/history/icmp/delete',{method:'DELETE'}).then(function(r){return r.json()}).then(function(d){if(d.success)load();else alert(d.error)}).catch(function(){alert('Ошибка')})}
window.addEventListener('DOMContentLoaded',load);
</script></body></html>
